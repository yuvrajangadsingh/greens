name: Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # Test scripts directly (no brew)
  test-scripts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version
        run: bash sync.sh --version

      - name: Help
        run: bash sync.sh --help

      - name: Status (no config)
        run: bash sync.sh --status

      - name: Resync (no config)
        run: |
          # Should fail gracefully with no config
          bash sync.sh --resync 2>&1 || true

      - name: Reset (no config)
        run: echo "n" | bash sync.sh --reset

      - name: Setup wizard (non-interactive)
        run: |
          # Create a temp work dir with a fake git repo
          mkdir -p /tmp/test-work/fake-repo
          cd /tmp/test-work/fake-repo
          git init
          git remote add origin https://github.com/test-org/test-repo.git
          cd -

          # Create a temp mirror repo
          mkdir -p /tmp/test-mirror
          cd /tmp/test-mirror
          git init
          git commit --allow-empty -m "init"
          cd -

          # Add a remote to the mirror repo so the "already exists" path works
          cd /tmp/test-mirror
          git remote add origin https://github.com/testuser/test-mirror.git
          cd -

          # Pipe inputs to setup wizard:
          # Auth is auto-detected as HTTPS from fake-repo, so no auth_choice prompt.
          # 1. work dir
          # 2. PAT ready? (n)
          # 3. enter token now? (n)
          # 4. emails
          # 5. org name
          # 6. github username (empty)
          # 7. mirror email
          # 8. personal github username
          # 9. since (empty)
          # 10. copy messages (n)
          # 11-15. extra inputs for mirror/push prompts and scheduler
          #
          # timeout prevents infinite loop if inputs run out (prompt_mirror_url
          # spins on EOF). The || true keeps the step green regardless.
          printf '/tmp/test-work\nn\nn\ntest@test.com\ntest-org\n\npersonal@test.com\ntestuser\n\nn\n3\n3\nn\nn\n3\n' \
            | MIRROR_DIR=/tmp/test-mirror timeout 60 bash setup.sh || true

          # Verify config was created
          if [ -f "$HOME/.contrib-mirror/config" ]; then
            echo "Config created:"
            cat "$HOME/.contrib-mirror/config"
          else
            echo "WARN: Config not created (expected in non-interactive mode)"
          fi

      - name: Status (with config)
        run: |
          if [ -f "$HOME/.contrib-mirror/config" ]; then
            bash sync.sh --status
          else
            echo "Skipping — no config from setup test"
          fi

      - name: Resync (with config, no mirror remote)
        run: |
          # Should prompt for confirmation, we say no
          echo "n" | bash sync.sh --resync 2>&1 || true

      - name: Exact email matching
        run: |
          # Verify --author="<email>" does exact matching
          mkdir -p /tmp/test-exact-match && cd /tmp/test-exact-match
          git init
          # Commit with a longer email that contains a shorter one as substring
          GIT_AUTHOR_EMAIL="yuvraj@test.com" GIT_COMMITTER_EMAIL="yuvraj@test.com" \
            git commit --allow-empty -m "commit by yuvraj"
          GIT_AUTHOR_EMAIL="raj@test.com" GIT_COMMITTER_EMAIL="raj@test.com" \
            git commit --allow-empty -m "commit by raj"

          # Substring match (old behavior) would return both
          substring_count="$(git log --all --author="raj@test.com" --format="%H" | wc -l | tr -d ' ')"
          # Exact match (new behavior) should return only raj's commit
          exact_count="$(git log --all --author="<raj@test.com>" --format="%H" | wc -l | tr -d ' ')"

          echo "Substring match count: $substring_count (expected 2)"
          echo "Exact match count: $exact_count (expected 1)"

          if [ "$exact_count" -eq 1 ]; then
            echo "PASS: exact email matching works"
          else
            echo "FAIL: expected 1 commit for exact match, got $exact_count"
            exit 1
          fi

      - name: Mirror email in commits
        run: |
          # Verify MIRROR_EMAIL overrides author on commits
          mkdir -p /tmp/test-mirror-email && cd /tmp/test-mirror-email
          git init && git commit --allow-empty -m "init"
          mirror_env=(env GIT_AUTHOR_EMAIL="personal@test.com" GIT_COMMITTER_EMAIL="personal@test.com")
          GIT_AUTHOR_DATE="2026-01-01 12:00:00" GIT_COMMITTER_DATE="2026-01-01 12:00:00" \
            "${mirror_env[@]}" git commit --allow-empty -m "test" --quiet
          author_email="$(git log -1 --format='%ae')"
          if [ "$author_email" = "personal@test.com" ]; then
            echo "PASS: mirror commit authored as personal@test.com"
          else
            echo "FAIL: expected personal@test.com, got $author_email"
            exit 1
          fi

  # Windows smoke tests (Git Bash)
  test-windows:
    runs-on: windows-latest
    steps:
      - name: Disable autocrlf before checkout
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      # --- Line endings ---
      - name: Shell scripts have LF endings
        shell: bash
        run: |
          fail=0
          for f in sync.sh setup.sh; do
            if grep -Prl '\r$' "$f" >/dev/null 2>&1; then
              echo "FAIL: $f has CRLF"
              fail=1
            fi
          done
          exit $fail

      - name: Batch script has CRLF endings
        shell: bash
        run: |
          if ! grep -Prl '\r$' greens.cmd >/dev/null 2>&1; then
            echo "FAIL: greens.cmd should have CRLF"
            exit 1
          fi

      # --- Windows detection ---
      - name: Git Bash reports MINGW/MSYS
        shell: bash
        run: |
          os="$(uname -s)"
          echo "uname -s = $os"
          [[ "$os" == MINGW* || "$os" == MSYS* ]] || { echo "FAIL: expected MINGW*/MSYS*, got $os"; exit 1; }

      - name: WINDIR is set
        shell: bash
        run: |
          [[ -n "${WINDIR:-}" ]] || { echo "FAIL: WINDIR not set"; exit 1; }
          echo "WINDIR=$WINDIR"

      # --- Git Bash discovery ---
      - name: Git Bash found at expected path
        shell: bash
        run: |
          found=""
          for p in \
            "/c/Program Files/Git/bin/bash.exe" \
            "/c/Program Files (x86)/Git/bin/bash.exe" \
            "${LOCALAPPDATA:-}/Programs/Git/bin/bash.exe"; do
            if [[ -f "$p" ]]; then
              found="$p"
              break
            fi
          done
          [[ -n "$found" ]] || { echo "FAIL: Git Bash not found at any expected path"; exit 1; }
          echo "Found: $found"

      # --- Path conversion ---
      - name: cygpath converts paths
        shell: bash
        run: |
          win=$(cygpath -w "$(pwd)")
          echo "cygpath -w = $win"
          [[ "$win" == *\\* ]] || { echo "FAIL: -w should have backslashes"; exit 1; }

          mixed=$(cygpath -m "$(pwd)")
          echo "cygpath -m = $mixed"
          [[ "$mixed" == *:/* ]] || { echo "FAIL: -m should produce C:/..."; exit 1; }

      - name: MSYS_NO_PATHCONV prevents mangling
        shell: bash
        run: |
          export MSYS_NO_PATHCONV=1
          # /Create should stay literal, not become C:/Create
          arg="/Create"
          [[ "$arg" == "/Create" ]] || { echo "FAIL: path got mangled even with MSYS_NO_PATHCONV"; exit 1; }

      # --- greens.cmd launcher ---
      - name: greens.cmd finds Git Bash
        shell: cmd
        run: |
          REM greens.cmd should find bash.exe and invoke sync.sh
          REM sync.sh --version exits cleanly with no config needed
          greens.cmd --version

      - name: greens.cmd passes arguments
        shell: cmd
        run: greens.cmd --help

      # --- sync.sh under Git Bash ---
      - name: Version
        shell: bash
        run: bash sync.sh --version

      - name: Help
        shell: bash
        run: bash sync.sh --help

      - name: Status (no config)
        shell: bash
        run: bash sync.sh --status

      - name: Reset (no config, say no)
        shell: bash
        run: echo "n" | bash sync.sh --reset

      # --- schtasks.exe accessible ---
      - name: schtasks.exe is reachable from Git Bash
        shell: bash
        run: |
          export MSYS_NO_PATHCONV=1
          # Query for nonexistent task, error is expected, just prove it runs
          schtasks.exe /Query /TN "greens-daily-sync" 2>&1 || true
          echo "schtasks.exe is accessible"

  # Test Homebrew install + upgrade (only on tags)
  test-brew:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Tap and install greens
        run: |
          brew tap yuvrajangadsingh/greens
          brew install greens

      - name: Version
        run: greens --version

      - name: Help
        run: greens --help

      - name: Status
        run: greens --status

      - name: Upgrade (no-op, validates command works)
        run: |
          brew upgrade greens 2>&1 || true
          greens --version
